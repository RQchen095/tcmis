<h2>次方與根號計算</h2>
<form method="POST">
    x: <input type="number" name="x" step="any"><br><br>
    運算：
    <select name="op">
        <option value="pow">^ (次方)</option>
        <option value="root">√ (根號)</option>
    </select><br><br>
    y: <input type="number" name="y" step="any"><br><br>
    <button type="submit">計算</button>
</form>
